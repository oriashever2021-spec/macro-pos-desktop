name: Build & Release (Windows)

# Builds the Windows installer on a real Windows runner.
# - On every run: uploads the .exe as a downloadable workflow artifact.
# - On a version tag (e.g. v1.0.1): also creates a published GitHub Release
#   with the .exe attached, giving a permanent download link.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed to create the Release and upload the .exe

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npx electron-builder --win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          generate_release_notes: true
